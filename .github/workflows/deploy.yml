name: Deploy to VPS

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 2.24.216.67
          username: deploy
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            set -x

            export NVM_DIR="$HOME/.nvm"
            if [ -s "$NVM_DIR/nvm.sh" ]; then
              . "$NVM_DIR/nvm.sh"
              nvm use --lts || true
            fi

            node -v || true
            npm -v || true
            pm2 -v || true

            cd /var/www/fabric.so_api-gallery-by-ab
            git fetch --prune
            git reset --hard origin/main

            (npm ci || npm install)
            npm run build
            (pm2 restart nextjs-app || pm2 start npm --name nextjs-app -- start)