name: Deploy to VPS

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 2.24.216.67
          username: deploy
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            set -x

            fail() {
              echo "::error::$1"
              exit 1
            }

            echo "Remote user: $(whoami)"
            echo "Remote host: $(hostname)"

            export NVM_DIR="$HOME/.nvm"
            if [ -s "$NVM_DIR/nvm.sh" ]; then
              . "$NVM_DIR/nvm.sh" || fail "Failed to load nvm from $NVM_DIR/nvm.sh"
              nvm use --lts || true
            fi

            command -v git >/dev/null 2>&1 || fail "git is not available on server PATH"
            command -v node >/dev/null 2>&1 || fail "node is not available on server PATH"
            command -v npm >/dev/null 2>&1 || fail "npm is not available on server PATH"

            node -v
            npm -v

            cd /var/www/fabric.so_api-gallery-by-ab || fail "Missing /var/www/fabric.so_api-gallery-by-ab"
            git fetch --prune || fail "git fetch failed"
            git reset --hard origin/main || fail "git reset failed"

            (npm ci || npm install) || fail "npm install failed"
            npm run build || fail "npm run build failed"

            if command -v pm2 >/dev/null 2>&1; then
              pm2 restart nextjs-app || pm2 start npm --name nextjs-app -- start || fail "pm2 start/restart failed"
            else
              fail "pm2 is not installed or not in PATH"
            fi